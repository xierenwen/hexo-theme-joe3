# Generic defaults for hexo-theme-joe3.
# Site-specific values belong in the blog root `_config.joe3.yml`.

menu:
  - name: Home
    path: /
  - name: Categories
    path: /categories/
  - name: Tags
    path: /tags/
  - name: Archives
    path: /archives/

pages:
  moments:
    enable: false
    empty: No moments yet.
  links:
    enable: false
    empty: No links yet.
  about:
    enable: false

categories:
  title: Categories
  type: card
  enable_post_num: true

tags:
  title: Tags
  type: card
  enable_post_num: true

aside:
  enable: true
  position: right
  author: true
  newest: true
  newest_count: 5
  tags: true
  tag_limit: 30
  categories: false
  timelife: true
  weather:
    enable: false
    token: ""

author:
  name: ""
  avatar: /img/avatar.jpg
  description: ""
  motto: ""
  bg: /img/author_bg.jpg
  bg_full: false
  bg_position: center center
  avatar_type: circle
  enable_level: false
  overview_type: A

navbar:
  show_logo: true
  logo: /img/avatar.jpg
  logo_radius: 50%
  brand: ""
  brand_height: 34px
  brand_max_width: 240px

home:
  enable_post_thumbnail: true
  lazyload_thumbnail: /img/lazy_thumbnail.jpg
  solid_thumbnails:
    - "#fb6c28"
    - "#5b8ff9"
    - "#5ad8a6"
    - "#f6bd16"
    - "#e8684a"
    - "#6dc8ec"
    - "#9270ca"
    - "#ff9d4d"
    - "#269a99"
    - "#ff99c3"

footer:
  since: ""
  icp: ""
  icp_link: ""
  police: ""
  police_link: ""

comments:
  enable: false
  waline:
    serverURL: ""
    locale: {}

search:
  enable: true
  path: search.json

toc:
  enable: true
  depth: 0

related_posts:
  enable: true
  count: 3
  title: Related

wordcount:
  enable: true

darkmode:
  enable: true
  default: auto

actions:
  enable: true
  back2top: true
  back2top_smooth: true

effects:
  wow: true
  animate: true
  stars:
    enable: false
    count: 14
    min_size: 16
    max_size: 26
    image: ""
  side_chars:
    enable: false
    left: ""
    right: ""

mermaid:
  enable: true
  version: "10.9.1"

code:
  title: true
  macdot: true
  copy: true

hitokoto:
  enable: true
  api: https://v1.hitokoto.cn

music:
  enable: false
  api: ""
  server: netease
  type: playlist
  id: ""
  theme: "#00b4af"
  autoplay: false
  volume: 0.7
  loop: all

pjax:
  enable: false

style:
  mode_color_light: "#00b4af"
  mode_color_dark: "#aa78b4"
  container_max_width: 1320px
  background_image: ""
  background_image_dark: ""
  background_size: cover
  background_position: center center
  background_attachment: fixed
  background_overlay: "rgba(255,255,255,.55)"
  background_overlay_dark: "rgba(0,0,0,.45)"
  fonts:
    enable: true
